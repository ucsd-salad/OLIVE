<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Semantic Event Graph</title>
  <style>
    :root {
      --bg: #f6f7f5;
      --panel: #ffffff;
      --ink: #1d2528;
      --muted: #657174;
      --line: #d9dedb;
      --accent: #0f766e;
      --accent-2: #9a5b13;
      --danger: #bd3f32;
      --logic: #7250a8;
      --shadow: 0 10px 30px rgba(25, 31, 32, 0.12);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background: var(--bg);
      font: 13px/1.35 ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow: hidden;
    }

    .app {
      height: 100vh;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 360px;
      grid-template-rows: 54px minmax(0, 1fr);
    }

    .toolbar {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 12px;
      background: rgba(255, 255, 255, 0.94);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(10px);
      z-index: 5;
    }

    .brand {
      font-weight: 720;
      white-space: nowrap;
      margin-right: 8px;
    }

    .stat {
      color: var(--muted);
      white-space: nowrap;
      margin-right: 10px;
    }

    input, select, button {
      height: 34px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      border-radius: 6px;
      padding: 0 10px;
      font: inherit;
    }

    input {
      width: min(330px, 26vw);
      min-width: 170px;
    }

    select { min-width: 128px; }

    button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      cursor: pointer;
    }

    button:hover, input:focus, select:focus {
      border-color: #97a6a3;
      outline: none;
    }

    .toggle {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      height: 34px;
      padding: 0 8px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      white-space: nowrap;
    }

    .toggle input {
      width: 15px;
      min-width: 15px;
      height: 15px;
      padding: 0;
    }

    .stage {
      position: relative;
      min-width: 0;
      min-height: 0;
      background:
        linear-gradient(90deg, rgba(29, 37, 40, 0.055) 1px, transparent 1px),
        linear-gradient(0deg, rgba(29, 37, 40, 0.055) 1px, transparent 1px),
        #f7f8f4;
      background-size: 28px 28px;
    }

    svg {
      width: 100%;
      height: 100%;
      display: block;
      cursor: grab;
      user-select: none;
    }

    svg.dragging { cursor: grabbing; }

    .edge {
      stroke-linecap: round;
      opacity: 0.48;
      cursor: pointer;
      pointer-events: stroke;
    }

    .edge.hidden, .node.hidden, .label.hidden, .edge-label.hidden { display: none; }
    .edge-hit {
      stroke: rgba(0, 0, 0, 0);
      stroke-width: 12px;
      cursor: pointer;
      pointer-events: stroke;
    }
    .edge-hit.hidden { display: none; }

    .edge.hard { stroke: #6f7c80; }
    .edge.structure { stroke: #6f7c80; opacity: 0.58; }
    .edge.source { stroke: var(--accent); opacity: 0.58; }
    .edge.logic { stroke: var(--logic); }
    .edge.domain { stroke: var(--danger); opacity: 0.72; }
    .edge.semantic { stroke: #2b7a78; opacity: 0.74; }

    .edge.active { opacity: 0.96; stroke-width: 2.8px; }

    .node circle {
      stroke: #fff;
      stroke-width: 1.8px;
      filter: drop-shadow(0 2px 3px rgba(18, 23, 25, 0.22));
    }

    .node.declaration circle { fill: #276f73; }
    .node.event circle { fill: #2f7a43; }
    .node.event-condition circle { fill: #1f6f8b; }
    .node.event-state circle { fill: #2f7a43; }
    .node.event-action circle { fill: #9a5b13; }
    .node.event-decision circle { fill: #7250a8; }
    .node.event-outcome circle { fill: #bd3f32; }
    .node.event-rule circle { fill: #5d6470; }
    .node.event-evidence circle { fill: #697276; }
    .node.event_object circle { fill: #276f73; }
    .node.object-constructor circle { fill: #4f7a3d; }
    .node.object-field circle { fill: #b36b00; }
    .node.object-theorem circle,
    .node.object-lemma circle,
    .node.object-example circle { fill: #7250a8; }
    .node.projection circle { fill: #b36b00; }
    .node.prop_expr circle { fill: #7250a8; }
    .node.domain_event circle { fill: #2f7a43; }
    .node.semantic-requirement circle { fill: #7250a8; }
    .node.semantic-decision_option circle { fill: #9a5b13; }
    .node.semantic-context_condition circle { fill: #1f6f8b; }
    .node.semantic-state_event circle { fill: #2f7a43; }
    .node.semantic-diagnosis_hypothesis circle { fill: #bd3f32; }
    .node.semantic-evidence_case circle { fill: #697276; }
    .node.module circle { fill: #697276; }

    .node.dim circle, .edge.dim { opacity: 0.16; }
    .edge-label.dim { opacity: 0.18; }
    .node.active circle { stroke: #1b1f20; stroke-width: 2.6px; }

    .label {
      font-size: 11px;
      fill: #20282a;
      paint-order: stroke;
      stroke: rgba(247, 248, 244, 0.9);
      stroke-width: 4px;
      stroke-linejoin: round;
      pointer-events: none;
    }

    .edge-label {
      font-size: 10px;
      font-weight: 650;
      fill: #355052;
      paint-order: stroke;
      stroke: rgba(247, 248, 244, 0.96);
      stroke-width: 5px;
      stroke-linejoin: round;
      text-anchor: middle;
      pointer-events: none;
    }

    .panel {
      min-width: 0;
      min-height: 0;
      overflow: auto;
      background: var(--panel);
      border-left: 1px solid var(--line);
    }

    .panel-inner { padding: 16px; }

    .panel h1 {
      font-size: 17px;
      line-height: 1.2;
      margin: 0 0 4px;
      letter-spacing: 0;
      overflow-wrap: anywhere;
    }

    .panel .sub {
      color: var(--muted);
      margin-bottom: 14px;
      overflow-wrap: anywhere;
    }

    .kv {
      display: grid;
      grid-template-columns: 96px minmax(0, 1fr);
      gap: 7px 10px;
      padding: 12px 0;
      border-top: 1px solid var(--line);
    }

    .key { color: var(--muted); }
    .val { overflow-wrap: anywhere; }

    .section-title {
      font-size: 12px;
      font-weight: 720;
      text-transform: uppercase;
      color: var(--muted);
      margin: 16px 0 8px;
      letter-spacing: 0.04em;
    }

    .pill-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .pill {
      max-width: 100%;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 4px 8px;
      background: #fbfbfa;
      overflow-wrap: anywhere;
      cursor: pointer;
    }

    .pill:hover { border-color: #9aa6a2; }

    .source-loc {
      color: var(--muted);
      font-size: 12px;
      margin: -2px 0 7px;
      overflow-wrap: anywhere;
    }

    pre {
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      background: #f1f2ef;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 10px;
      max-height: 300px;
      overflow: auto;
    }

    .legend {
      position: absolute;
      left: 12px;
      bottom: 12px;
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      padding: 8px;
      background: rgba(255, 255, 255, 0.9);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      max-width: calc(100% - 24px);
    }

    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      color: var(--muted);
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      display: inline-block;
    }

    .dot.declaration { background: #276f73; }
    .dot.event { background: #2f7a43; }
    .dot.condition { background: #1f6f8b; }
    .dot.action { background: #9a5b13; }
    .dot.decision { background: #7250a8; }
    .dot.outcome { background: #bd3f32; }
    .dot.relation { background: #2b7a78; }
    .dot.event_object { background: #276f73; }
    .dot.projection { background: #b36b00; }
    .dot.prop_expr { background: #7250a8; }
    .dot.domain_event { background: #2f7a43; }
    .dot.requirement { background: #7250a8; }
    .dot.decision_option { background: #9a5b13; }
    .dot.context_condition { background: #1f6f8b; }
    .dot.diagnosis_hypothesis { background: #bd3f32; }
    .dot.hard { background: #6f7c80; }
    .dot.structure { background: #6f7c80; }
    .dot.source { background: var(--accent); }
    .dot.logic { background: var(--logic); }
    .dot.domain { background: var(--danger); }

    @media (max-width: 900px) {
      .app {
        grid-template-columns: 1fr;
        grid-template-rows: auto minmax(0, 1fr) 300px;
      }
      .toolbar {
        flex-wrap: wrap;
        min-height: 54px;
      }
      input { width: 100%; }
      .panel {
        border-left: 0;
        border-top: 1px solid var(--line);
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="toolbar">
      <div class="brand">Semantic Event Graph</div>
      <div class="stat" id="stats"></div>
      <input id="search" type="search" placeholder="Search events">
      <select id="nodeKind"></select>
      <select id="edgeLayer"></select>
      <label class="toggle"><input id="domainOnly" type="checkbox"> Main events</label>
      <label class="toggle"><input id="showEvidence" type="checkbox"> Evidence</label>
      <button id="backBtn" type="button">Back</button>
      <button id="homeBtn" type="button">Home</button>
    </div>

    <main class="stage">
      <svg id="graph" aria-label="Semantic event graph"></svg>
      <div class="legend">
        <span class="legend-item"><span class="dot event"></span>Event</span>
        <span class="legend-item"><span class="dot condition"></span>Condition</span>
        <span class="legend-item"><span class="dot action"></span>Action</span>
        <span class="legend-item"><span class="dot decision"></span>Decision</span>
        <span class="legend-item"><span class="dot outcome"></span>Outcome</span>
        <span class="legend-item"><span class="dot relation"></span>Relation</span>
      </div>
    </main>

    <aside class="panel">
      <div class="panel-inner" id="details"></div>
    </aside>
  </div>

  <script>
    const graphData = JSON.parse(document.getElementById("graph-data").textContent);

      vx: 0,
      vy: 0,
      visible: node.displayByDefault !== false

    const nodeById = new Map(nodes.map(node => [node.id, node]));

    const includeHiddenEvidenceEdges = false;
    const hasDomainEvents = nodes.some(node => node.nodeKind === "domain_event" || node.nodeKind === "event");
    const hasSequenceEdges = edges.some(edge => ["has_condition", "has_outcome", "context_suggests", "context_triggers"].includes(edge.edgeKind));

    const width = () => svg.clientWidth || 900;

    const labelLayer = document.createElementNS(ns, "g");
    root.append(edgeLayer, nodeLayer, labelLayer);
    svg.append(root);

    const marker = document.createElementNS(ns, "marker");
    marker.setAttribute("id", "arrow");

    marker.setAttribute("refY", "5");
    marker.setAttribute("markerWidth", "5");
    marker.setAttribute("markerHeight", "5");
    marker.setAttribute("orient", "auto-start-reverse");
    const markerPath = document.createElementNS(ns, "path");

    marker.append(markerPath);
    const defs = document.createElementNS(ns, "defs");

    function nodeLabel(node) {

      if (["outcome", "then_outcome", "else_outcome", "alternative"].includes(node.eventRole)) {
        return base.toLowerCase().startsWith("then ") ? base : `then ${base}`;
      }
      return base;
    }

    function edgeLabel(edge) {
      if (edge.label || edge.relationLabel) return edge.label || edge.relationLabel;
      const readable = {
        has_condition: "has if",
        has_outcome: "has then",
        has_alternative: "or",
        context_suggests: "suggests",
        context_triggers: "then",
        context_blocks: "blocks",
        context_alternative: "otherwise",
        event_requires: "requires",
        uses_context: "uses context",
        grounded_in: "evidence"
      }[edge.edgeKind];
      if (readable) return readable;
      const roleValue = edge.role || edge.relationRole || edge.referenceRole || "";
      const role = roleValue ? `/${roleValue}` : "";
      return `${edge.edgeKind}${role}`;
    }

    function radius(node) {
      if (node.nodeKind === "event") {
        const baseByType = {
          condition: 9.4,
          state: 9.2,
          action: 9.8,
          decision: 10.2,
          outcome: 9.8,
          rule: 9.4,
          entity: 8.4,
          evidence: 7.2
        };
        const base = baseByType[node.eventType] || 9;
        return Math.min(base + Math.sqrt(node.degree || 0) * 0.75, 18);
      }
      if (node.nodeKind === "domain_event") {
        const baseBySemantic = {
          requirement: 9.2,
          decision_option: 8.8,
          context_condition: 8.8,
          diagnosis_hypothesis: 9.4,
          state_event: 8.8,
          scenario_event: 8.6,
          evidence_case: 6.8
        };
        const base = baseBySemantic[node.semanticKind] || 8.2;
        return Math.min(base + Math.sqrt(node.degree || 0) * 0.7, 17);
      }
      if (node.nodeKind === "event_object") {
        const baseByObject = {
          inductive: 8.4,
          structure: 8.4,
          class: 8.4,
          def: 7.4,
          theorem: 7.4,
          lemma: 7.4,
          example: 7,
          constructor: 6.4,
          field: 6.2,
          external: 5.6
        };
        const base = baseByObject[node.objectKind] || 6.8;
        return Math.min(base + Math.sqrt(node.degree || 0) * 0.62, 15);
      }
      const base = {
        declaration: 7.5,
        projection: 6.5,
        prop_expr: 5.8,
        domain_event: 8.2,
        event: 9,
        module: 6
      }[node.nodeKind] || 5.5;
      const deg = node.degree || 0;
      return Math.min(base + Math.sqrt(deg) * 0.7, 15);
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, ch => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#39;"
      }[ch]));
    }

    function safeClass(value) {
      return String(value || "unknown").toLowerCase().replace(/[^a-z0-9_-]/g, "_");
    }

    function formatSpan(span) {
      if (!span) return "";
      const start = span.startLine ?? span.line ?? "";
      const end = span.endLine ?? start;
      if (!start) return "";
      return start === end ? `L${start}` : `L${start}-L${end}`;
    }

    function sourceLocation(record, spanKey = "sourceSpan") {
      const file = record.sourceFile || graphData.metadata?.sourceFile || "";
      const span = formatSpan(record[spanKey]);
      if (file && span) return `${file}:${span}`;
      return file || span;
    }

    function kvRow(key, value) {
      if (value === undefined || value === null || value === "") return "";
      return `<div class="key">${escapeHtml(key)}</div><div class="val">${escapeHtml(value)}</div>`;
    }

    function sourceSection(title, text, location) {
      if (!text && !location) return "";
      return `
        <div class="section-title">${escapeHtml(title)}</div>
        ${location ? `<div class="source-loc">${escapeHtml(location)}</div>` : ""}
        ${text ? `<pre>${escapeHtml(text)}</pre>` : ""}
      `;
    }

    function isDomainNode(node) {
      return node.nodeKind === "event" ||
        node.nodeKind === "domain_event" ||
        (node.nodeKind === "event_object" && node.displayByDefault !== false);
    }

    function isSequenceWrapper(node) {
      return node.nodeKind === "domain_event" &&
        node.eventRole === "source_declaration_event" &&
        edges.some(edge => edge.source === node && ["has_condition", "has_outcome", "has_alternative"].includes(edge.edgeKind));
    }

    function nodeDefaultVisible(node) {
      if (showEvidence.checked) return true;
      if (isSequenceWrapper(node)) return false;
      if (hasSequenceEdges && node.eventRole === "source_declaration_event" && node.semanticKind === "scenario_event") return false;
      if (hasDomainEvents && !isDomainNode(node)) return false;
      return node.displayByDefault !== false;
    }

    function edgeDefaultVisible(edge) {
      return showEvidence.checked || edge.displayByDefault !== false;
    }

    function populateFilters() {
      const nodeKinds = ["all", ...Array.from(new Set(nodes.map(n => n.nodeKind || "unknown"))).sort()];
      nodeKindSelect.innerHTML = nodeKinds.map(kind => `<option value="${escapeHtml(kind)}">${kind === "all" ? "All events" : kind}</option>`).join("");

      const layers = ["all", ...Array.from(new Set(edges.map(e => e.layer || "unknown"))).sort()];
      edgeLayerSelect.innerHTML = layers.map(layer => `<option value="${escapeHtml(layer)}">${layer === "all" ? "All edges" : layer}</option>`).join("");
    }

    function buildDegree() {
      nodes.forEach(node => node.degree = 0);
      edges.forEach(edge => {
        edge.source.degree += 1;
        edge.target.degree += 1;
      });
    }

    function edgeAllowedByControls(edge) {
      const layer = edgeLayerSelect.value;
      const layerOk = layer === "all" || edge.layer === layer;
      const proofText = [edge.role, edge.relationRole, edge.relationLabel, edge.edgeKind, edge.sourceKind].filter(Boolean).join(" ");
      const proofOk = showEvidence.checked || includeHiddenEvidenceEdges || !proofText.includes("proof");
      const defaultOk = edgeDefaultVisible(edge);
      const domainOk = !domainOnly.checked || (isDomainNode(edge.source) && isDomainNode(edge.target));
      return defaultOk && layerOk && proofOk && domainOk;
    }

    function snapshotView() {
      return {
        nodeIds: nodes.filter(node => node.visible).map(node => node.id),
        edgeIds: edges.filter(edge => edge.visible).map(edge => edge.id),
        selectedNodeId: selectedNode?.id || null,
        selectedEdgeId: selectedEdge?.id || null,
        search: search.value,
        nodeKind: nodeKindSelect.value,
        edgeLayer: edgeLayerSelect.value,
        domainOnly: domainOnly.checked,
        showEvidence: showEvidence.checked,
      };
    }

    function restoreView(state) {
      const nodeIds = new Set(state.nodeIds);
      const edgeIds = new Set(state.edgeIds);
      search.value = state.search || "";
      nodeKindSelect.value = state.nodeKind || "all";
      edgeLayerSelect.value = state.edgeLayer || "all";
      domainOnly.checked = !!state.domainOnly;
      showEvidence.checked = !!state.showEvidence;
      nodes.forEach(node => { node.visible = nodeIds.has(node.id); });
      edges.forEach(edge => { edge.visible = edgeIds.has(edge.id); });
      selectedNode = state.selectedNodeId ? nodeById.get(state.selectedNodeId) || null : null;
      selectedEdge = state.selectedEdgeId ? edges.find(edge => edge.id === state.selectedEdgeId) || null : null;
      layoutGraph({ fit: true });
      updateClasses();
      updateStats();
      updateBackState();
      if (selectedEdge) {
        renderEdgeDetails(selectedEdge);
      } else if (selectedNode) {
        renderDetails(selectedNode);
      } else {
        renderEmptyDetails();
      }
    }

    function updateBackState() {
      backBtn.disabled = viewHistory.length === 0;
    }

    function backView() {
      const previous = viewHistory.pop();
      if (previous) restoreView(previous);
    }

    function isSequenceEdge(edge) {
      return ["context_suggests", "context_triggers", "context_blocks", "context_alternative"].includes(edge.edgeKind);
    }

    function shouldUseSequenceLayout() {
      return hasSequenceEdges && !showEvidence.checked && edgeLayerSelect.value === "all";
    }

    function isSemanticEventGraph() {
      return graphData.metadata?.extractorMode === "semantic_event_graph" ||
        nodes.some(node => node.nodeKind === "event") ||
        edges.some(edge => edge.layer === "semantic" || edge.relationKind);
    }

    function isSemanticEventNode(node) {
      return node.nodeKind === "event" || node.nodeKind === "domain_event";
    }

    function semanticType(node) {
      if (node.eventType) return node.eventType;
      const semantic = node.semanticKind || "";
      if (semantic === "context_condition" || semantic === "diagnosis_hypothesis") return "condition";
      if (semantic === "decision_option") return "decision";
      if (semantic === "requirement") return "rule";
      if (semantic === "evidence_case") return "evidence";
      if (semantic === "state_event" || semantic === "scenario_event") return "state";
      return "state";
    }

    function semanticTypeRank(node) {
      const ranks = {
        evidence: 0,
        entity: 0,
        condition: 1,
        state: 2,
        rule: 3,
        decision: 4,
        action: 5,
        outcome: 6
      };
      return ranks[semanticType(node)] ?? 3;
    }

    function semanticText(node) {
      return [
        node.id,
        node.label,
        node.shortName,
        node.name,
        node.description,
        node.sourceText,
        semanticType(node)
      ].filter(Boolean).join(" ").toLowerCase();
    }

    function decisionSeverityRank(node) {
      const text = semanticText(node);
      if (/(non[-_\s]?urgent|queue|wait|routine|normal|low|minor|green)/.test(text)) return 0;
      if (/(priority|urgent|rapid|soon|moderate|yellow|orange)/.test(text)) return 1;
      if (/(emergency|critical|immediate|resuscit|red|danger|life[-_\s]?threat)/.test(text)) return 2;
      return 1;
    }

    function isConditionLike(node) {
      return ["condition", "state", "rule", "entity", "evidence"].includes(semanticType(node));
    }

    function flowRelation(edge) {
      return edge.relationKind || edge.edgeKind || "";
    }

    function isDiagnosticFlowEdge(edge) {
      if (!edge.visible || !edge.source.visible || !edge.target.visible || edge.source === edge.target) return false;
      if (!isSemanticEventNode(edge.source) || !isSemanticEventNode(edge.target)) return false;
      const relation = flowRelation(edge);
      return !["contrasts", "prevents", "blocks"].includes(relation);
    }

    function diagnosticFlowEndpoints(edge) {
      const relation = flowRelation(edge);
      if (relation === "includes") {
        return { source: edge.target, target: edge.source };
      }
      return { source: edge.source, target: edge.target };
    }

    function shouldUseDiagnosticLayout() {
      return isSemanticEventGraph() && !showEvidence.checked;
    }

    function nodeVisualWidth(node) {
      return Math.min(Math.max(nodeLabel(node).length * 7.2 + 76, 190), 430);
    }

    function rowWidth(row) {
      if (!row.length) return 0;
      return row.reduce((sum, node) => sum + nodeVisualWidth(node), 0);
    }

    function splitRows(items, maxPerRow = 4) {
      const rows = [];
      for (let i = 0; i < items.length; i += maxPerRow) {
        rows.push(items.slice(i, i + maxPerRow));
      }
      return rows;
    }

    function assignSequenceRow(row, y) {
      const totalWidth = rowWidth(row);
      let cursor = -totalWidth / 2;
      row.forEach(node => {
        const width = nodeVisualWidth(node);
        node.x = cursor + width / 2;
        node.y = y;
        node.vx = 0;
        node.vy = 0;
        node.sequenceLayout = true;
        cursor += width;
      });
    }

    function sourceOrder(node) {
      return Number(node.sourceSpan?.startLine || 999999);
    }

    function declarationKind(node) {
      return node.objectKind || node.declKind || node.nodeKind || "unknown";
    }

    function declaresProp(node) {
      return /:\s*Prop\b/.test(`${node.sourceText || ""} ${node.typeText || ""}`);
    }

    function kindRank(node) {
      if (node.nodeKind === "module") return 0;
      if (node.nodeKind === "event") {
        const eventType = node.eventType || "";
        const eventRanks = {
          condition: 1,
          state: 2,
          decision: 3,
          action: 4,
          outcome: 5,
          rule: 6,
          evidence: 7,
          entity: 8
        };
        return eventRanks[eventType] || 3;
      }
      if (node.nodeKind === "domain_event") {
        const semantic = node.semanticKind || "";
        if (semantic === "context_condition") return 2;
        if (semantic === "requirement") return 3;
        if (semantic === "decision_option") return 4;
        if (semantic === "diagnosis_hypothesis") return 4;
        if (semantic === "state_event" || semantic === "scenario_event") return 4;
        if (semantic === "evidence_case") return 7;
        return 4;
      }
      if (node.nodeKind === "event_object" || node.nodeKind === "declaration") {
        const kind = declarationKind(node);
        if (["inductive", "structure", "class"].includes(kind)) return 1;
        if (["constructor", "field", "projection", "derived_instance"].includes(kind)) return 2;
        if (kind === "def") return declaresProp(node) ? 3 : 5;
        if (["theorem", "lemma", "example"].includes(kind)) return 6;
        if (kind === "instance") return 5;
        if (kind === "external") return 7;
        return 4;
      }
      if (node.nodeKind === "projection") return 2;
      if (node.nodeKind === "prop_expr") return 4;
      return 7;
    }

    function baseLevel(node) {
      return kindRank(node);
    }

    function sortKey(node) {
      return [
        String(kindRank(node)).padStart(2, "0"),
        String(sourceOrder(node)).padStart(6, "0"),
        node.namespace || "",
        declarationKind(node),
        nodeLabel(node)
      ].join("|").toLowerCase();
    }

    function layoutDiagnostic() {
      const visible = nodes.filter(node => node.visible);
      visible.forEach(node => {
        node.sequenceLayout = true;
        node.x = 0;
        node.y = 0;
        node.vx = 0;
        node.vy = 0;
      });
      if (!visible.length) return;

      const flowEdges = edges.filter(isDiagnosticFlowEdge).map(edge => ({
        edge,
        ...diagnosticFlowEndpoints(edge)
      })).filter(item => item.source.visible && item.target.visible && item.source !== item.target);

      const incomingByTarget = new Map();
      const outgoingBySource = new Map();
      flowEdges.forEach(item => {
        if (!incomingByTarget.has(item.target.id)) incomingByTarget.set(item.target.id, []);
        if (!outgoingBySource.has(item.source.id)) outgoingBySource.set(item.source.id, []);
        incomingByTarget.get(item.target.id).push(item);
        outgoingBySource.get(item.source.id).push(item);
      });

      const depthMemo = new Map();
      function conditionDepth(node, stack = new Set()) {
        if (!isConditionLike(node)) return 0;
        if (depthMemo.has(node.id)) return depthMemo.get(node.id);
        if (stack.has(node.id)) return 0;
        stack.add(node.id);
        const incoming = (incomingByTarget.get(node.id) || [])
          .filter(item => isConditionLike(item.source));
        let depth = 0;
        incoming.forEach(item => {
          depth = Math.max(depth, conditionDepth(item.source, stack) + 1);
        });
        stack.delete(node.id);
        depth = Math.min(depth, 8);
        depthMemo.set(node.id, depth);
        return depth;
      }

      const reachableRankMemo = new Map();
      function reachableDecisionRank(node) {
        if (reachableRankMemo.has(node.id)) return reachableRankMemo.get(node.id);
        if (semanticType(node) === "decision") {
          const rank = decisionSeverityRank(node);
          reachableRankMemo.set(node.id, rank);
          return rank;
        }
        const seen = new Set([node.id]);
        let frontier = [node];
        let best = null;
        for (let depth = 0; depth < 8 && frontier.length; depth += 1) {
          const next = [];
          frontier.forEach(current => {
            (outgoingBySource.get(current.id) || []).forEach(item => {
              const target = item.target;
              if (seen.has(target.id)) return;
              seen.add(target.id);
              if (semanticType(target) === "decision") {
                const rank = decisionSeverityRank(target);
                best = best === null ? rank : Math.max(best, rank);
              }
              next.push(target);
            });
          });
          frontier = next;
        }
        if (best === null) best = decisionSeverityRank(node);
        reachableRankMemo.set(node.id, best);
        return best;
      }

      const conditionNodes = visible.filter(isConditionLike);
      const maxConditionDepth = Math.max(0, ...conditionNodes.map(node => conditionDepth(node)));
      const decisionBase = maxConditionDepth + 1;
      const actionBase = decisionBase + 3;

      visible.forEach(node => {
        const type = semanticType(node);
        let stage = 0;
        if (isConditionLike(node)) {
          stage = conditionDepth(node);
        } else if (type === "decision") {
          stage = decisionBase + decisionSeverityRank(node);
        } else if (type === "action") {
          stage = actionBase;
        } else if (type === "outcome") {
          stage = actionBase + 1;
        } else {
          stage = decisionBase;
        }
        node.diagnosticStage = stage;
        node.diagnosticBranch = reachableDecisionRank(node);
      });

      const columns = new Map();
      visible.forEach(node => {
        const key = node.diagnosticStage;
        if (!columns.has(key)) columns.set(key, []);
        columns.get(key).push(node);
      });

      const stages = Array.from(columns.keys()).sort((a, b) => a - b);
      const colGap = 238;
      const rowGap = 92;
      const stageToX = new Map();
      const totalWidth = Math.max(0, stages.length - 1) * colGap;
      stages.forEach((stage, index) => {
        stageToX.set(stage, index * colGap - totalWidth / 2);
      });

      const compareDiagnostic = (a, b) =>
        (a.diagnosticBranch - b.diagnosticBranch) ||
        (semanticTypeRank(a) - semanticTypeRank(b)) ||
        (conditionDepth(a) - conditionDepth(b)) ||
        (sourceOrder(a) - sourceOrder(b)) ||
        nodeLabel(a).localeCompare(nodeLabel(b));

      columns.forEach((columnNodes, stage) => {
        columnNodes.sort(compareDiagnostic);
        const height = Math.max(0, columnNodes.length - 1) * rowGap;
        columnNodes.forEach((node, index) => {
          node.x = stageToX.get(stage);
          node.y = index * rowGap - height / 2;
        });
      });
    }

    function treeCandidate(edge) {
      const source = edge.source;
      const target = edge.target;
      if (!source.visible || !target.visible || source === target) return null;

      const skipParent = node => node.scope === "builtin" || node.scope === "imported_or_unresolved";
      let parent = null;
      let child = null;
      let priority = 0;

      if (["context_triggers", "context_blocks", "context_alternative", "context_suggests"].includes(edge.edgeKind)) {
        parent = source;
        child = target;
        priority = 94;
      } else if (["has_condition", "has_outcome", "has_alternative", "event_requires"].includes(edge.edgeKind)) {
        parent = source;
        child = target;
        priority = edge.edgeKind === "event_requires" ? 88 : 82;
      } else if (edge.edgeKind === "uses_context") {
        parent = target;
        child = source;
        priority = 76;
      } else if (edge.edgeKind === "grounded_in") {
        parent = source;
        child = target;
        priority = 30;
      } else if (["constructor_of", "field_of", "derived_instance_of", "generated_by"].includes(edge.edgeKind)) {
        parent = target;
        child = source;
        priority = 100;
      } else if (edge.edgeKind === "extends") {
        parent = target;
        child = source;
        priority = 96;
      } else if (edge.edgeKind === "derived_from") {
        parent = target;
        child = source;
        priority = 90;
      } else if (["has_prop_body", "has_prop_statement"].includes(edge.edgeKind)) {
        parent = source;
        child = target;
        priority = 82;
      } else if (["has_conjunct", "has_disjunct", "quantifies", "conditional_branch", "negates"].includes(edge.edgeKind)) {
        parent = source;
        child = target;
        priority = 72;
      } else if (["requires", "definition_mentions", "signature_mentions", "statement_mentions", "proof_mentions"].includes(edge.edgeKind)) {
        parent = target;
        child = source;
        priority = edge.edgeKind === "statement_mentions" ? 78
          : edge.edgeKind === "proof_mentions" ? 74
            : edge.edgeKind === "requires" ? 70
              : 64;
      } else if (["uses_field", "uses_constructor", "field_type_mentions"].includes(edge.edgeKind)) {
        parent = target;
        child = source;
        priority = 52;
      } else if (edge.edgeKind === "covers_constructor") {
        parent = target;
        child = source;
        priority = 42;
      } else if (edge.edgeKind === "uses" && ["type", "field_type"].includes(edge.role || "")) {
        parent = target;
        child = source;
        priority = 50;
      } else if ([
        "conditional_connects",
        "has_alternative"
      ].includes(edge.edgeKind)) {
        parent = source;
        child = target;
        priority = 34;
      }

      if (!parent || !child || skipParent(parent)) return null;
      return { parent, child, priority, edge };
    }

    function chooseHierarchyParents() {
      const parentByChild = new Map();
      edges.forEach(edge => {
        if (!edge.visible) return;
        const candidate = treeCandidate(edge);
        if (!candidate) return;
        const previous = parentByChild.get(candidate.child.id);
        if (!previous || candidate.priority > previous.priority) {
          parentByChild.set(candidate.child.id, candidate);
        }
      });
      return parentByChild;
    }

    function computeLevels(parentByChild) {
      const memo = new Map();
      function levelOf(node, stack = new Set()) {
        if (memo.has(node.id)) return memo.get(node.id);
        if (stack.has(node.id)) {
          const fallback = baseLevel(node);
          memo.set(node.id, fallback);
          return fallback;
        }
        stack.add(node.id);
        const parentRecord = parentByChild.get(node.id);
        let level = baseLevel(node);
        if (parentRecord && parentRecord.parent.visible) {
          level = Math.max(level, levelOf(parentRecord.parent, stack) + 1);
        }
        stack.delete(node.id);
        level = Math.min(level, 18);
        memo.set(node.id, level);
        return level;
      }
      nodes.forEach(node => {
        if (node.visible) node.hierarchyLevel = levelOf(node);
      });
    }

    function layoutHierarchy() {
      const parentByChild = chooseHierarchyParents();
      computeLevels(parentByChild);

      const visible = nodes.filter(node => node.visible);
      visible.forEach(node => { node.sequenceLayout = false; });
      const childrenByParent = new Map();
      const childIds = new Set();

      parentByChild.forEach((record, childId) => {
        const child = nodeById.get(childId);
        const parent = record.parent;
        if (!child?.visible || !parent?.visible) return;
        if ((parent.hierarchyLevel ?? 0) >= (child.hierarchyLevel ?? 0)) return;
        if (!childrenByParent.has(parent.id)) childrenByParent.set(parent.id, []);
        childrenByParent.get(parent.id).push(child);
        childIds.add(child.id);
      });

      childrenByParent.forEach(children => {
        children.sort((a, b) => sortKey(a).localeCompare(sortKey(b)));
      });

      const roots = visible
        .filter(node => !childIds.has(node.id))
        .sort((a, b) => sortKey(a).localeCompare(sortKey(b)));

      const widthMemo = new Map();
      function subtreeWidth(node) {
        if (widthMemo.has(node.id)) return widthMemo.get(node.id);
        const children = childrenByParent.get(node.id) || [];
        const width = Math.max(1, children.reduce((sum, child) => sum + subtreeWidth(child), 0));
        widthMemo.set(node.id, width);
        return width;
      }

      const unitX = 154;
      const rowGapY = 78;
      const bandGapY = 72;
      const top = 56;
      let cursor = 0;

      function assignSubtree(node, left, width) {
        node.x = (left + width / 2) * unitX;
        node.vx = 0;
        node.vy = 0;

        const children = childrenByParent.get(node.id) || [];
        let childCursor = left;
        children.forEach(child => {
          const childWidth = subtreeWidth(child);
          assignSubtree(child, childCursor, childWidth);
          childCursor += childWidth;
        });
      }

      roots.forEach(root => {
        const width = subtreeWidth(root);
        assignSubtree(root, cursor, width);
        cursor += width + 0.8;
      });

      if (!visible.length) return;
      const maxNodesPerRow = 18;
      const layoutBand = node => ({
        level: node.hierarchyLevel ?? baseLevel(node),
        rank: kindRank(node)
      });
      const bandKey = band => `${band.level}|${band.rank}`;
      const bands = Array.from(new Map(visible.map(node => {
        const band = layoutBand(node);
        return [bandKey(band), band];
      })).values()).sort((a, b) => (a.level - b.level) || (a.rank - b.rank));
      let currentY = top;

      bands.forEach(band => {
        const group = visible
          .filter(node => bandKey(layoutBand(node)) === bandKey(band))
          .sort((a, b) => (a.x - b.x) || sortKey(a).localeCompare(sortKey(b)));
        const rows = [];
        for (let i = 0; i < group.length; i += maxNodesPerRow) {
          rows.push(group.slice(i, i + maxNodesPerRow));
        }
        rows.forEach((rowNodes, rowIndex) => {
          const rowWidth = Math.max(1, rowNodes.length - 1) * unitX;
          rowNodes.forEach((node, index) => {
            node.x = index * unitX - rowWidth / 2;
            node.y = currentY + rowIndex * rowGapY;
          });
        });
        currentY += Math.max(1, rows.length) * rowGapY + bandGapY;
      });

      const minX = Math.min(...visible.map(node => node.x));
      const maxX = Math.max(...visible.map(node => node.x));
      const centerX = (minX + maxX) / 2;
      visible.forEach(node => {
        node.x -= centerX;
      });
    }

    function layoutSequence() {
      const visible = nodes.filter(node => node.visible);
      visible.forEach(node => {
        node.sequenceLayout = false;
        node.x = 0;
        node.y = 0;
        node.vx = 0;
        node.vy = 0;
      });
      if (!visible.length) return;

      const grouped = new Map();
      edges.forEach(edge => {
        if (!edge.visible || !isSequenceEdge(edge)) return;
        if (!edge.source.visible || !edge.target.visible) return;
        const key = edge.sourceDecl || edge.sourceNode || `${edge.source.id}->${edge.target.id}`;
        if (!grouped.has(key)) {
          grouped.set(key, {
            key,
            conditions: new Map(),
            follows: new Map(),
            edges: [],
            order: Math.min(sourceOrder(edge.source), sourceOrder(edge.target))
          });
        }
        const group = grouped.get(key);
        group.conditions.set(edge.source.id, edge.source);
        group.follows.set(edge.target.id, edge.target);
        group.edges.push(edge);
        group.order = Math.min(group.order, sourceOrder(edge.source), sourceOrder(edge.target));
      });

      const groups = Array.from(grouped.values())
        .filter(group => group.conditions.size || group.follows.size)
        .sort((a, b) => (a.order - b.order) || a.key.localeCompare(b.key));
      const placed = new Set();
      let currentY = 78;
      const conditionGapY = 112;
      const outcomeGapY = 116;
      const groupGapY = 108;

      groups.forEach(group => {
        const conditions = Array.from(group.conditions.values())
          .filter(node => node.visible)
          .sort((a, b) => sourceOrder(a) - sourceOrder(b) || nodeLabel(a).localeCompare(nodeLabel(b)));
        const follows = Array.from(group.follows.values())
          .filter(node => node.visible)
          .sort((a, b) =>
            Number(b.probabilityPercent ?? -1) - Number(a.probabilityPercent ?? -1) ||
            nodeLabel(a).localeCompare(nodeLabel(b))
          );
        if (!conditions.length && !follows.length) return;

        const conditionRows = splitRows(conditions, 3);
        conditionRows.forEach(row => {
          assignSequenceRow(row, currentY);
          row.forEach(node => placed.add(node.id));
          currentY += conditionGapY;
        });

        const followRows = splitRows(follows, 4);
        followRows.forEach(row => {
          assignSequenceRow(row, currentY);
          row.forEach(node => placed.add(node.id));
          currentY += outcomeGapY;
        });
        currentY += groupGapY;
      });

      const leftovers = visible
        .filter(node => !placed.has(node.id))
        .sort((a, b) => sortKey(a).localeCompare(sortKey(b)));
      splitRows(leftovers, 4).forEach(row => {
        assignSequenceRow(row, currentY);
        currentY += outcomeGapY;
      });
    }

    function layoutGraph(options = {}) {
      if (shouldUseDiagnosticLayout()) {
        layoutDiagnostic();
      } else if (shouldUseSequenceLayout()) {
        layoutSequence();
      } else {
        layoutHierarchy();
      }
      updatePositions();
      if (options.fit !== false) fitView();
    }

    function renderElements() {
      edgeLayer.innerHTML = "";
      nodeLayer.innerHTML = "";
      labelLayer.innerHTML = "";

      edges.forEach(edge => {
        const hit = document.createElementNS(ns, "line");
        hit.classList.add("edge-hit");
        hit.dataset.id = edge.id;
        hit.addEventListener("click", event => {
          event.stopPropagation();
          selectEdge(edge);
        });
        edge.hitEl = hit;
        edgeLayer.append(hit);

        const line = document.createElementNS(ns, "line");
        line.classList.add("edge", edge.layer || "hard");
        line.dataset.id = edge.id;
        line.setAttribute("stroke-width", edge.probabilityTarget ? "2.7" : "1.9");
        line.setAttribute("marker-end", "url(#arrow)");
        const title = document.createElementNS(ns, "title");
        title.textContent = `${edgeLabel(edge)}\n${edge.src}\n${edge.dst}`;
        line.append(title);
        line.addEventListener("click", event => {
          event.stopPropagation();
          selectEdge(edge);
        });
        edge.el = line;
        edgeLayer.append(line);

        const relation = document.createElementNS(ns, "text");
        relation.classList.add("edge-label");
        relation.textContent = edgeLabel(edge);
        relation.dataset.id = edge.id;
        edge.labelEl = relation;
        labelLayer.append(relation);
      });

      nodes.forEach(node => {
        const group = document.createElementNS(ns, "g");
        group.classList.add("node", safeClass(node.nodeKind || "unknown"));
        if (node.eventType) group.classList.add(`event-${safeClass(node.eventType)}`);
        if (node.objectKind) group.classList.add(`object-${safeClass(node.objectKind)}`);
        if (node.semanticKind) group.classList.add(`semantic-${safeClass(node.semanticKind)}`);
        group.dataset.id = node.id;
        const circle = document.createElementNS(ns, "circle");
        circle.setAttribute("r", radius(node));
        const title = document.createElementNS(ns, "title");
        title.textContent = `${nodeLabel(node)}\n${node.id}`;
        group.append(circle, title);
        group.addEventListener("pointerdown", event => {
          event.stopPropagation();
          draggingNode = node;
          node.fixed = true;
          group.setPointerCapture(event.pointerId);
        });
        group.addEventListener("click", event => {
          event.stopPropagation();
          openNode(node);
        });
        group.addEventListener("dblclick", event => {
          event.stopPropagation();
          openNode(node);
        });
        node.el = group;
        nodeLayer.append(group);

        const label = document.createElementNS(ns, "text");
        label.classList.add("label");
        label.textContent = nodeLabel(node);
        label.dataset.id = node.id;
        node.labelEl = label;
        labelLayer.append(label);
      });
    }

    function applyTransform() {
      root.setAttribute("transform", `translate(${panX},${panY}) scale(${zoom})`);
    }

    function updatePositions() {
      edges.forEach(edge => {
        if (!edge.el) return;
        edge.el.setAttribute("x1", edge.source.x);
        edge.el.setAttribute("y1", edge.source.y);
        edge.el.setAttribute("x2", edge.target.x);
        edge.el.setAttribute("y2", edge.target.y);
        if (edge.hitEl) {
          edge.hitEl.setAttribute("x1", edge.source.x);
          edge.hitEl.setAttribute("y1", edge.source.y);
          edge.hitEl.setAttribute("x2", edge.target.x);
          edge.hitEl.setAttribute("y2", edge.target.y);
        }
        if (edge.labelEl) {
          edge.labelEl.setAttribute("x", (edge.source.x + edge.target.x) / 2);
          edge.labelEl.setAttribute("y", (edge.source.y + edge.target.y) / 2 - 5);
        }
      });
      nodes.forEach(node => {
        if (node.el) node.el.setAttribute("transform", `translate(${node.x},${node.y})`);
        if (node.labelEl) {
          if (node.sequenceLayout) {
            node.labelEl.setAttribute("x", node.x);
            node.labelEl.setAttribute("y", node.y + radius(node) + 17);
            node.labelEl.setAttribute("text-anchor", "middle");
          } else {
            node.labelEl.setAttribute("x", node.x + radius(node) + 4);
            node.labelEl.setAttribute("y", node.y + 4);
            node.labelEl.setAttribute("text-anchor", "start");
          }
        }
      });
    }

    function matchesSearch(node, query) {
      if (!query) return true;
      const haystack = [
        node.id,
        node.name,
        node.shortName,
        node.label,
        node.pretty,
        node.description,
        node.eventType,
        node.fieldName,
        node.declKind,
        node.objectKind,
        node.sourceText,
        node.nodeKind
      ].filter(Boolean).join(" ").toLowerCase();
      return haystack.includes(query);
    }

    function applyFilters() {
      const query = search.value.trim().toLowerCase();
      const kind = nodeKindSelect.value;
      selectedNode = null;
      selectedEdge = null;

      nodes.forEach(node => {
        const kindOk = kind === "all" || node.nodeKind === kind;
        const domainOk = !domainOnly.checked || isDomainNode(node);
        node.visible = nodeDefaultVisible(node) && kindOk && domainOk && matchesSearch(node, query);
      });

      edges.forEach(edge => {
        edge.visible = edge.source.visible && edge.target.visible && edgeAllowedByControls(edge);
      });

      nodes.forEach(node => {
        const connectedVisible = edges.some(edge => edge.visible && (edge.source === node || edge.target === node));
        if (!query && !domainOnly.checked && kind === "all") {
          node.visible = node.visible;
        } else if (!connectedVisible && !isDomainNode(node) && domainOnly.checked) {
          node.visible = false;
        }
      });

      layoutGraph({ fit: true });
      updateClasses();
      updateStats();
      viewHistory.length = 0;
      updateBackState();
      renderEmptyDetails();
    }

    function updateClasses() {
      const activeIds = selectedNode
        ? neighborhoodIds(selectedNode)
        : selectedEdge
          ? new Set([selectedEdge.source.id, selectedEdge.target.id])
          : new Set();
      edges.forEach(edge => {
        edge.el.classList.toggle("hidden", !edge.visible);
        if (edge.hitEl) edge.hitEl.classList.toggle("hidden", !edge.visible);
        if (edge.labelEl) edge.labelEl.classList.toggle("hidden", !edge.visible || zoom < 0.36);
        const active = edge.visible && (
          edge === selectedEdge ||
          (selectedNode && (edge.source === selectedNode || edge.target === selectedNode))
        );
        edge.el.classList.toggle("active", active);
        edge.el.classList.toggle("dim", (selectedNode || selectedEdge) && edge.visible && !active);
        if (edge.labelEl) edge.labelEl.classList.toggle("dim", (selectedNode || selectedEdge) && edge.visible && !active);
      });
      nodes.forEach(node => {
        node.el.classList.toggle("hidden", !node.visible);
        node.labelEl.classList.toggle("hidden", !node.visible || zoom < 0.42);
        node.el.classList.toggle("active", selectedNode === node || (selectedEdge && (selectedEdge.source === node || selectedEdge.target === node)));
        node.el.classList.toggle("dim", (selectedNode || selectedEdge) && node.visible && !activeIds.has(node.id));
      });
    }

    function neighborhoodIds(node) {
      const ids = new Set([node.id]);
      edges.forEach(edge => {
        if (!edge.visible) return;
        if (edge.source === node) ids.add(edge.target.id);
        if (edge.target === node) ids.add(edge.source.id);
      });
      return ids;
    }

    function connectedEdges(node) {
      return edges.filter(edge => edge.source === node || edge.target === node);
    }

    function edgeFocusPriority(edge) {
      if (["context_triggers", "context_blocks", "context_alternative", "context_suggests"].includes(edge.edgeKind)) return 92;
      if (["has_condition", "has_outcome", "has_alternative", "event_requires"].includes(edge.edgeKind)) return 88;
      if (["indicates", "classifies_as", "leads_to", "requires", "enables", "evidence_for", "refines"].includes(edge.relationKind || edge.edgeKind)) return 86;
      if (["includes", "other"].includes(edge.relationKind || edge.edgeKind) && edge.layer === "semantic") return 72;
      if (edge.edgeKind === "uses_context") return 72;
      if (edge.edgeKind === "grounded_in") return 28;
      if (["constructor_of", "field_of", "derived_instance_of", "generated_by"].includes(edge.edgeKind)) return 100;
      if (edge.edgeKind === "extends") return 96;
      if (edge.edgeKind === "derived_from") return 90;
      if (["has_prop_body", "has_prop_statement"].includes(edge.edgeKind)) return 82;
      if (["has_conjunct", "has_disjunct", "quantifies", "conditional_branch", "negates"].includes(edge.edgeKind)) return 72;
      if (["implies", "equivalent_to", "enables", "requires", "blocks", "covers_constructor"].includes(edge.edgeKind)) return 58;
      if (["statement_mentions", "definition_mentions", "signature_mentions", "field_type_mentions"].includes(edge.edgeKind)) return 54;
      if (["uses_field", "uses_constructor", "conditional_connects", "has_alternative"].includes(edge.edgeKind)) return 50;
      if (edge.edgeKind === "uses" && ["type", "field_type"].includes(edge.role || "")) return 54;
      if (edge.edgeKind === "uses" && edge.role === "projection") return 52;
      if (edge.edgeKind === "uses" && edge.role === "constructor_literal") return 48;
      if (edge.edgeKind === "uses" && edge.role === "body") return 42;
      if (edge.edgeKind === "uses" && edge.role === "statement") return 42;
      if (edge.edgeKind === "proof_mentions") return 24;
      if (edge.layer === "domain") return 36;
      if (edge.layer === "logic") return 34;
      return 20;
    }

    function focusNodeSet(root, maxDepth = 2, limit = 90) {
      const ids = new Set([root.id]);
      let frontier = [root.id];
      const allowed = edges
        .filter(edge => edgeAllowedByControls(edge))
        .sort((a, b) => edgeFocusPriority(b) - edgeFocusPriority(a));

      for (let depth = 0; depth < maxDepth && frontier.length && ids.size < limit; depth += 1) {
        const frontierIds = new Set(frontier);
        const next = [];
        for (const edge of allowed) {
          let other = null;
          if (frontierIds.has(edge.source.id)) other = edge.target;
          if (frontierIds.has(edge.target.id)) other = edge.source;
          if (!other || ids.has(other.id)) continue;
          ids.add(other.id);
          next.push(other.id);
          if (ids.size >= limit) break;
        }
        frontier = next;
      }
      return ids;
    }

    function selectNode(node) {
      selectedNode = node;
      selectedEdge = null;
      updateClasses();
      renderDetails(node);
    }

    function openNode(node, push = true) {
      if (push) {
        viewHistory.push(snapshotView());
        updateBackState();
      }
      selectedNode = node;
      selectedEdge = null;
      search.value = "";
      nodeKindSelect.value = "all";
      const ids = focusNodeSet(node);
      nodes.forEach(n => { n.visible = ids.has(n.id); });
      edges.forEach(e => { e.visible = ids.has(e.source.id) && ids.has(e.target.id) && edgeAllowedByControls(e); });
      layoutGraph({ fit: true });
      updateClasses();
      updateStats();
      renderDetails(node);
    }

    function selectEdge(edge) {
      selectedEdge = edge;
      selectedNode = null;
      updateClasses();
      renderEdgeDetails(edge);
    }

    function nodeMetadataRows(node, incident, sourceLoc) {
      if (node.nodeKind === "event") {
        return [
          kvRow("Event Type", node.eventType),
          kvRow("Description", node.description),
          kvRow("Confidence", node.confidence),
          kvRow("Confidence Reason", node.confidenceReason),
          kvRow("Source", sourceLoc),
          kvRow("Degree", incident.length)
        ].join("");
      }
      return `
          ${kvRow("Kind", node.nodeKind)}
          ${kvRow("Event Type", node.eventType)}
          ${kvRow("Object", node.objectKind || node.declKind)}
          ${kvRow("Semantic", node.semanticKind)}
          ${kvRow("Role", node.eventRole)}
          ${kvRow("Granularity", node.semanticGranularity)}
          ${kvRow("Name", node.name || node.fullName)}
          ${kvRow("Parent", node.parentObject)}
          ${kvRow("Namespace", node.namespace)}
          ${kvRow("Scope", node.scope)}
          ${kvRow("Claim", node.claimLevel)}
          ${kvRow("Evidence Kind", node.evidenceKind)}
          ${kvRow("Probability Target", node.probabilityTarget)}
          ${kvRow("Probability Percent", node.probabilityPercent)}
          ${kvRow("Probability Estimate", node.probabilityEstimate)}
          ${kvRow("Confidence", node.confidence)}
          ${kvRow("Confidence Reason", node.confidenceReason)}
          ${kvRow("Expression", node.sourceExpression)}
          ${kvRow("Source", sourceLoc)}
          ${kvRow("Degree", incident.length)}
      `;
    }

    function renderDetails(node) {
      const incident = connectedEdges(node);
      const outgoing = incident.filter(edge => edge.source === node);
      const incoming = incident.filter(edge => edge.target === node);
      const sourceLoc = sourceLocation(node);
      details.innerHTML = `
        <h1>${escapeHtml(nodeLabel(node))}</h1>
        <div class="sub">${escapeHtml(node.id)}</div>
        <div class="kv">
          ${nodeMetadataRows(node, incident, sourceLoc)}
        </div>
        ${sourceSection("Source", node.sourceText, sourceLoc)}
        <div class="section-title">Outgoing</div>
        <div class="pill-row">${edgePills(outgoing, "out")}</div>
        <div class="section-title">Incoming</div>
        <div class="pill-row">${edgePills(incoming, "in")}</div>
        <div class="section-title">JSON</div>
        <pre>${escapeHtml(JSON.stringify(node, replacerForNodeJson, 2))}</pre>
      `;
      details.querySelectorAll("[data-node]").forEach(el => {
        el.addEventListener("click", () => {
          const next = nodeById.get(el.getAttribute("data-node"));
          if (next) openNode(next);
        });
      });
    }

    function replacerForNodeJson(key, value) {
      if (["el", "labelEl", "vx", "vy", "x", "y", "visible", "fixed"].includes(key)) return undefined;
      return value;
    }

    function renderEdgeDetails(edge) {
      const edgeLoc = sourceLocation(edge);
      const declLoc = sourceLocation(edge, "declarationSpan");
      details.innerHTML = `
        <h1>${escapeHtml(edgeLabel(edge))}</h1>
        <div class="sub">${escapeHtml(edge.id)}</div>
        <div class="kv">
          ${kvRow("Layer", edge.layer)}
          ${kvRow("Kind", edge.edgeKind)}
          ${kvRow("Relation", edge.relationLabel || edge.relationRole || edge.role)}
          ${kvRow("Relation Kind", edge.relationKind)}
          ${kvRow("Description", edge.description)}
          ${kvRow("Reference", edge.referenceRole)}
          ${kvRow("Source Kind", edge.sourceKind)}
          ${kvRow("Source Decl", edge.sourceDecl)}
          ${kvRow("Claim", edge.claimLevel)}
          ${kvRow("Evidence Kind", edge.evidenceKind)}
          ${kvRow("Probability Target", edge.probabilityTarget)}
          ${kvRow("Probability Percent", edge.probabilityPercent)}
          ${kvRow("Probability Estimate", edge.probabilityEstimate)}
          ${kvRow("Confidence", edge.confidence)}
          ${kvRow("Confidence Reason", edge.confidenceReason)}
          ${kvRow("Source", edgeLoc)}
          ${kvRow("Expression", edge.sourceExpression)}
          ${kvRow("Coverage Variable", edge.coverageVariable)}
          ${kvRow("Coverage Type", edge.coverageType)}
          ${kvRow("Evidence Text", edge.evidence)}
          ${kvRow("Ambiguous", edge.ambiguous === undefined ? "" : edge.ambiguous)}
          ${kvRow("Prior", edge.prior)}
          ${kvRow("Posterior", edge.posterior)}
        </div>
        <div class="section-title">Endpoints</div>
        <div class="pill-row">
          <span class="pill" data-node="${escapeHtml(edge.source.id)}">src: ${escapeHtml(nodeLabel(edge.source))}</span>
          <span class="pill" data-node="${escapeHtml(edge.target.id)}">dst: ${escapeHtml(nodeLabel(edge.target))}</span>
        </div>
        ${sourceSection("Edge Source", edge.sourceText, edgeLoc)}
        ${sourceSection("Declaration Source", edge.declarationSource, declLoc)}
        <div class="section-title">JSON</div>
        <pre>${escapeHtml(JSON.stringify(edge, replacerForEdgeJson, 2))}</pre>
      `;
      details.querySelectorAll("[data-node]").forEach(el => {
        el.addEventListener("click", () => {
          const next = nodeById.get(el.getAttribute("data-node"));
          if (next) openNode(next);
        });
      });
    }

    function replacerForEdgeJson(key, value) {
      if (["el", "hitEl", "labelEl", "source", "target", "visible"].includes(key)) return undefined;
      return value;
    }

    function edgePills(edgeList, direction) {
      if (!edgeList.length) return `<span class="key">None</span>`;
      return edgeList.slice(0, 60).map(edge => {
        const other = direction === "out" ? edge.target : edge.source;
        return `<span class="pill" data-node="${escapeHtml(other.id)}">${escapeHtml(edgeLabel(edge))}: ${escapeHtml(nodeLabel(other))}</span>`;
      }).join("");
    }

    function renderEmptyDetails() {
      details.innerHTML = `
        <h1>${escapeHtml(graphData.metadata?.module || "Graph")}</h1>
        <div class="sub">${escapeHtml(graphData.metadata?.sourceFile || "")}</div>
        <div class="kv">
          <div class="key">Events</div><div class="val">${nodes.length}</div>
          <div class="key">Edges</div><div class="val">${edges.length}</div>
          <div class="key">Mode</div><div class="val">${escapeHtml(graphData.metadata?.extractorMode || "")}</div>
        </div>
      `;
    }

    function updateStats() {
      const visibleNodes = nodes.filter(n => n.visible).length;
      const visibleEdges = edges.filter(e => e.visible).length;
      stats.textContent = `${visibleNodes}/${nodes.length} events · ${visibleEdges}/${edges.length} relations`;
    }

    function fitView() {
      const visible = nodes.filter(n => n.visible);
      if (!visible.length) return;
      const minX = Math.min(...visible.map(n => n.x));
      const maxX = Math.max(...visible.map(n => n.x));
      const minY = Math.min(...visible.map(n => n.y));
      const maxY = Math.max(...visible.map(n => n.y));
      const graphW = Math.max(1, maxX - minX);
      const graphH = Math.max(1, maxY - minY);
      zoom = Math.min(width() / (graphW + 160), height() / (graphH + 160), 2.2);
      panX = width() / 2 - ((minX + maxX) / 2) * zoom;
      panY = height() / 2 - ((minY + maxY) / 2) * zoom;
      applyTransform();
      updateClasses();
    }

    function resetView() {
      selectedNode = null;
      selectedEdge = null;
      viewHistory.length = 0;
      search.value = "";
      nodeKindSelect.value = "all";
      edgeLayerSelect.value = "all";
      domainOnly.checked = false;
      showEvidence.checked = false;
      nodes.forEach(node => {
        node.fixed = false;
        node.visible = nodeDefaultVisible(node);
      });
      edges.forEach(edge => {
        edge.visible = edge.source.visible && edge.target.visible && edgeAllowedByControls(edge);
      });
      zoom = 1;
      panX = 0;
      panY = 0;
      applyTransform();
      layoutGraph({ fit: true });
      updateClasses();
      updateStats();
      updateBackState();
      renderEmptyDetails();
    }

    function pointerToGraph(event) {
      const rect = svg.getBoundingClientRect();
      return {
        x: (event.clientX - rect.left - panX) / zoom,
        y: (event.clientY - rect.top - panY) / zoom
      };
    }

    svg.addEventListener("pointerdown", event => {
      if (event.target.closest(".node") || event.target.closest(".edge")) return;
      panning = true;
      panStart = { x: event.clientX, y: event.clientY, panX, panY };
      svg.classList.add("dragging");
    });

    svg.addEventListener("pointermove", event => {
      if (draggingNode) {
        const p = pointerToGraph(event);
        draggingNode.x = p.x;
        draggingNode.y = p.y;
        draggingNode.vx = 0;
        draggingNode.vy = 0;
        updatePositions();
        return;
      }
      if (panning && panStart) {
        panX = panStart.panX + event.clientX - panStart.x;
        panY = panStart.panY + event.clientY - panStart.y;
        applyTransform();
      }
    });

    window.addEventListener("pointerup", () => {
      draggingNode = null;
      panning = false;
      svg.classList.remove("dragging");
    });

    svg.addEventListener("wheel", event => {
      event.preventDefault();
      const rect = svg.getBoundingClientRect();
      const mx = event.clientX - rect.left;
      const my = event.clientY - rect.top;
      const graphX = (mx - panX) / zoom;
      const graphY = (my - panY) / zoom;
      const factor = event.deltaY < 0 ? 1.12 : 0.89;
      zoom = Math.max(0.18, Math.min(4, zoom * factor));
      panX = mx - graphX * zoom;
      panY = my - graphY * zoom;
      applyTransform();
      updateClasses();
    }, { passive: false });

    search.addEventListener("input", applyFilters);
    nodeKindSelect.addEventListener("change", applyFilters);
    edgeLayerSelect.addEventListener("change", applyFilters);
    domainOnly.addEventListener("change", applyFilters);
    showEvidence.addEventListener("change", applyFilters);
    backBtn.addEventListener("click", backView);
    homeBtn.addEventListener("click", resetView);
    window.addEventListener("resize", () => {
      layoutGraph({ fit: true });
    });

    buildDegree();
    populateFilters();
    renderElements();
    resetView();
  </script>
</body>
</html>
